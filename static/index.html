<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuestDo | Legendary Ascent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=MedievalSharp&family=Quicksand:wght@400;600&display=swap');
        
        :root {
            --parchment: #f4e4bc;
            --gold: #d4af37;
            --crimson: #7c0a02;
            --wood: #3d2b1f;
            --mountain-base: #1a120b;
            --mountain-mid: #3d2b1f;
            --mountain-peak: #5c4033;
        }

        .text-wood { color: var(--wood); }
        .text-crimson { color: var(--crimson); }
        .text-gold { color: var(--gold); }
        .bg-wood { background-color: var(--wood); }
        .bg-crimson { background-color: var(--crimson); }
        .bg-gold { background-color: var(--gold); }

        body {
            font-family: 'Quicksand', sans-serif;
            background: #0a0705;
            min-height: 100vh;
            color: #e2d1a6;
            overflow-x: hidden;
        }

        .rpg-header { font-family: 'Cinzel Decorative', cursive; }
        .rpg-body { font-family: 'MedievalSharp', cursive; }

        .parchment-card {
            background: #f4e4bc;
            background-image: url('https://www.transparenttextures.com/patterns/paper.png');
            color: #3d2b1f;
            border: 8px solid #3d2b1f;
            border-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="50" height="50"><rect x="0" y="0" width="50" height="50" fill="none" stroke="%233d2b1f" stroke-width="10"/></svg>') 10;
        }

        .rpg-btn {
            background: var(--wood);
            border: 2px solid var(--gold);
            color: var(--gold);
            transition: all 0.2s;
        }

        .rpg-btn.active {
            background: var(--crimson);
            color: white;
            box-shadow: 0 0 20px var(--crimson);
        }

        /* Detailed Mountain Graphics */
        .mountain-world {
            height: 700px;
            background: linear-gradient(to top, #0f0a07 0%, #1a120b 30%, #3d2b1f 70%, #5c4033 100%);
            border: 6px solid var(--wood);
            position: relative;
            overflow: hidden;
            border-radius: 30px;
            box-shadow: inset 0 0 100px rgba(0,0,0,1);
        }

        /* Rocky Texture Peaks */
        .rock-peak {
            position: absolute;
            bottom: -20px;
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            background: linear-gradient(135deg, #2c1e14 0%, #1a120b 100%);
            box-shadow: inset -10px 0 20px rgba(0,0,0,0.5);
        }

        .rock-peak::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('https://www.transparenttextures.com/patterns/rocky-wall.png');
            opacity: 0.3;
        }

        .snow-cap {
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 100%; height: 30%;
            background: #fff;
            clip-path: polygon(50% 0%, 100% 100%, 80% 80%, 60% 100%, 40% 80%, 20% 100%, 0% 100%);
            opacity: 0.2;
        }

        /* Forest Layer at Bottom */
        .forest-layer {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 100px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="50" viewBox="0 0 100 50"><path d="M10 50 L25 10 L40 50 Z M45 50 L60 20 L75 50 Z M80 50 L90 30 L100 50 Z" fill="%230a0705"/></svg>');
            background-repeat: repeat-x;
            opacity: 0.8;
            z-index: 3;
        }

        /* Knight Figure (Detailed Silhouette) */
        .knight-container {
            position: absolute;
            width: 100px; /* Slightly larger */
            height: 120px;
            z-index: 100; /* Ensure he is ABOVE everything */
            transition: all 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .knight-graphic {
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 0 20px var(--gold)); /* Heavy glow */
            animation: climb-sway 1.5s infinite ease-in-out;
        }

        /* Hero Plaque Icon */
        .hero-plaque-icon {
            width: 60px;
            height: 60px;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="%23d4af37"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
        }

        @keyframes climb-sway {
            0% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
            100% { transform: translateY(0) rotate(-3deg); }
        }

        /* Milestones */
        .milestone-node { position: absolute; z-index: 10; transition: all 0.5s; }
        .flag-pole { width: 4px; height: 45px; background: var(--gold); position: relative; border-radius: 2px; }
        .flag-cloth {
            position: absolute; top: 0; left: 4px; width: 35px; height: 25px;
            background: var(--crimson); clip-path: polygon(0 0, 100% 50%, 0 100%);
            animation: wave 2.5s infinite ease-in-out;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        @keyframes wave { 0%, 100% { transform: scaleX(1) skewY(0deg); } 50% { transform: scaleX(0.8) skewY(5deg); } }

        .node-info {
            position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
            width: 150px; background: #f4e4bc; padding: 10px; border-radius: 8px;
            border: 2px solid var(--wood); color: var(--wood); font-size: 11px;
            text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .locked .flag-cloth { background: #333; }
        .locked .node-info { opacity: 0.4; filter: sepia(1); }

        /* Atmospheric Effects */
        .mist {
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(to top, transparent 50%, rgba(255,255,255,0.05) 100%);
            pointer-events: none; z-index: 10;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* UI Utilities */
        .seal-checkbox {
            appearance: none; width: 30px; height: 30px;
            background: #b91c1c; border-radius: 50%; cursor: pointer;
            position: relative; border: 3px solid #7c0a02;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .seal-checkbox:hover {
            background: #9d2016;
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(185, 28, 28, 0.5);
        }

        .seal-checkbox:checked { background: #15803d; border-color: #064e3b; }
        .seal-checkbox:checked::after {
            content: '✓'; position: absolute; color: white;
            font-weight: bold; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto space-y-8">
        
        <!-- Character Plaque -->
        <header class="parchment-card p-6 rounded shadow-2xl relative overflow-hidden">
            <div class="flex items-center gap-6">
                <div class="w-20 h-20 rounded-full border-4 border-wood flex items-center justify-center bg-wood shadow-2xl overflow-hidden">
                    <!-- New Knight Header Icon -->
                    <img src="knight.png" class="w-16 h-16 object-contain" alt="Knight Icon">
                </div>
                <div class="flex-1">
                    <h1 id="rank-title" class="text-xs font-bold uppercase tracking-widest text-wood/60 transition-all duration-500">Unproven Recruit</h1>
                    <h2 id="level-text" class="rpg-header text-4xl font-black text-crimson uppercase">Rank 1</h2>
                </div>
            </div>
            <div class="mt-4 space-y-2">
                <div class="flex justify-between rpg-header text-sm font-bold text-wood">
                    <span>Bounty Progress</span>
                    <span id="xp-text">0 / 100</span>
                </div>
                <!-- Progress Bar Container -->
                <div class="w-full h-6 bg-wood/20 border-2 border-wood rounded-full overflow-hidden shadow-inner p-0.5">
                    <div id="xp-fill" class="h-full bg-gradient-to-r from-amber-400 to-yellow-600 rounded-full transition-all duration-1000 ease-out shadow-[0_0_15px_rgba(251,191,36,0.5)]" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="flex gap-2">
            <button id="tab-quests" onclick="switchTab('quests')" class="rpg-btn flex-1 py-3 rounded-lg font-bold rpg-header text-xs active shadow-lg">Bounty Board</button>
            <button id="tab-history" onclick="switchTab('history')" class="rpg-btn flex-1 py-3 rounded-lg font-bold rpg-header text-xs opacity-60 shadow-lg">Hall of Records</button>
            <button id="tab-trophy" onclick="switchTab('trophy')" class="rpg-btn flex-1 py-3 rounded-lg font-bold rpg-header text-xs opacity-60 shadow-lg">Legendary Ascent</button>
        </nav>

        <!-- Quest Section -->
        <section id="quests-section" class="space-y-6 animate__animated animate__fadeIn">
            <div class="relative group">
                <input type="text" id="task-input" onkeypress="handleEnter(event)" placeholder="What is your next decree?" 
                       class="w-full bg-[#f4e4bc] border-4 border-[#3d2b1f] rounded-xl p-5 text-[#3d2b1f] font-bold placeholder:text-wood/40 focus:outline-none shadow-inner">
                <button onclick="addTask()" class="absolute right-3 top-3 h-12 w-12 bg-gold text-wood border-2 border-wood rounded-lg flex items-center justify-center shadow-lg hover:bg-amber-500 hover:scale-110 active:scale-95 transition-all"><span class="material-icons">add_task</span></button>
            </div>

            <!-- New Multi-Action Buttons -->
            <div class="flex gap-3">
                <button onclick="checkAllTasks()" class="flex-1 bg-green-800 text-white font-bold py-2 px-4 rounded border-2 border-green-950 hover:bg-green-700 transition-all text-[10px] uppercase tracking-widest flex items-center justify-center gap-2">
                    <span class="material-icons text-sm">done_all</span> Check All
                </button>
                <button onclick="removeAllTasks()" class="flex-1 bg-red-900 text-white font-bold py-2 px-4 rounded border-2 border-red-950 hover:bg-red-800 transition-all text-[10px] uppercase tracking-widest flex items-center justify-center gap-2">
                    <span class="material-icons text-sm">delete_sweep</span> Remove All
                </button>
            </div>

            <div id="task-list" class="space-y-4"></div>
        </section>

        <!-- History Section (Hall of Records) -->
        <section id="history-section" class="hidden animate__animated animate__fadeIn space-y-4">
            <div class="parchment-card p-6 rounded shadow-xl">
                <h3 class="rpg-header text-2xl text-wood border-b-2 border-wood/20 pb-2 mb-4">Hall of Records</h3>
                <div id="history-list" class="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                    <!-- Completed quests will be logged here -->
                </div>
            </div>
        </section>

        <!-- Graphical Mountain Section -->
        <section id="trophy-section" class="hidden animate__animated animate__fadeIn space-y-6">
            <div class="mountain-world" id="world">
                <!-- Stars -->
                <div class="star w-1 h-1 top-10 left-10"></div>
                <div class="star w-1 h-1 top-20 right-20"></div>
                <div class="star w-1 h-1 top-40 left-1/2"></div>
                
                <!-- Detailed Rock Peaks -->
                <div class="rock-peak" style="width: 400px; height: 500px; left: -100px; bottom: -50px; z-index: 1;">
                    <div class="snow-cap"></div>
                </div>
                <div class="rock-peak" style="width: 500px; height: 600px; right: -150px; bottom: -80px; z-index: 2;">
                    <div class="snow-cap"></div>
                </div>
                <div class="rock-peak" style="width: 600px; height: 750px; left: 10%; bottom: -100px; z-index: 0; background: #1a120b;"></div>
                
                <div class="forest-layer"></div>
                <div class="mist"></div>
                
                <!-- Milestones -->
                <div id="nodes-container"></div>
                
                <!-- The Detailed Knight -->
                <div id="knight" class="knight-container" style="bottom: 40px; left: 10%;">
                    <div class="knight-graphic"></div>
                </div>
            </div>
        </section>

    </div>

    <!-- Loot Toast: Fixed Background transparency -->
    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 px-10 py-6 rounded-2xl shadow-2xl text-center opacity-0 pointer-events-none transition-all duration-500 transform -translate-y-20 z-50 bg-[#3d2b1f] border-4 border-[#d4af37]">
        <h3 class="text-2xl font-black text-gold rpg-header">QUEST CONQUERED!</h3>
        <p class="text-xs font-bold tracking-widest text-white mt-1 uppercase">Bounty progress increased</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
